services:
  - type: web
    name: inventory-order-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-order-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://inventory-order-frontend.onrender.com
      - key: APP_ENV
        value: production

  - type: web
    name: inventory-order-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://inventory-order-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: inventory-order-db
    plan: free
    databaseName: inventory_db
    user: inventory_user
